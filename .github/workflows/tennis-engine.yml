name: Tennis Engine · official results ingest

# ZONE 27 · 網球賽果自動鏡像 pipeline。
#   · fetch-tennis-results.mjs → 從 ESPN 公開 tennis scoreboard 抓「已打完單打」→ 寫
#     lib/tennis-results.json(賽果鏡像 · 同 CPBL/MLB/足球 pattern)。
# 配對 + PROVED/DIVERGED 在 lib/tennis/results.ts + matches.ts 載入時做(英文名 en 比對 ·
# 手動 finalResult 永遠優先 · 對不到一律退手動 = 不毒害帳本)。 display 仍是運彩中文名。
#
# 每 3 小時跑一次。 ESPN 公開 endpoint · 0 auth / 0 付費 / 0 secret · 手動也可在 Actions 頁
# 按 "Run workflow"。
on:
  schedule:
    # 對齊 cpbl / mlb / soccer engine 的每 3 小時節奏。
    - cron: "45 */3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: tennis-engine
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch tennis official results
        run: node scripts/fetch-tennis-results.mjs
      - name: Commit if changed
        run: |
          git config user.name "zone27-tennis-bot"
          git config user.email "noreply@anthropic.com"
          git add lib/tennis-results.json
          if git diff --staged --quiet; then
            echo "no tennis result changes this run"
          else
            git commit -m "網球賽果自動鏡像:ESPN 官方已打完單打入帳本(GitHub Action)

          Co-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push
          fi
